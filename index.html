<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Regalos | Melany & Alejandro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f5f5f3;
      color:#1f1f1f;
      min-height:100vh;
      padding:40px 20px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:3rem;
      font-weight:700;
      margin-bottom:10px;
      color:#1f1f1f;
    }

    .hero p{
      color:#666;
      font-size:1.1rem;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.05);
      overflow:hidden;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      padding:18px;
      font-size:0.95rem;
      color:#777;
      font-weight:600;
      border-bottom:1px solid #ececec;
    }

    td{
      padding:18px;
      border-bottom:1px solid #f0f0f0;
      vertical-align:middle;
    }

    tr:hover{
      background:#fafafa;
    }

    .gift-name{
      font-weight:500;
    }

    .category{
      background:#f1f1f1;
      padding:6px 12px;
      border-radius:999px;
      font-size:0.8rem;
      display:inline-block;
      color:#555;
      font-weight:500;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ddd;
      outline:none;
      font-family:'Poppins',sans-serif;
      transition:0.2s;
      font-size:0.95rem;
    }

    input:focus{
      border-color:#b89f7a;
      box-shadow:0 0 0 4px rgba(184,159,122,0.15);
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      font-size:0.85rem;
      font-weight:600;
    }

    .available{
      background:#eaf8ef;
      color:#1e8b4d;
    }

    .reserved{
      background:#fdecec;
      color:#c0392b;
    }

    .footer{
      text-align:center;
      margin-top:25px;
      color:#888;
      font-size:0.9rem;
    }

@media(max-width:768px){

  .hero h1{
    font-size:2.2rem;
  }

  .card{
    padding:15px;
    overflow-x:auto;
  }

  table{
    min-width:900px;
  }

  th,
  td{
    padding:12px 10px;
    font-size:0.9rem;
    white-space:nowrap;
  }

  input{
    min-width:180px;
    padding:10px;
    font-size:0.9rem;
  }

  .category{
    font-size:0.72rem;
    padding:5px 10px;
  }

  .status{
    font-size:0.72rem;
    padding:6px 10px;
  }

}

  </style>

</head>

<body>

  <div class="container">

    <div class="hero">
      <h1>Melany & Alejandro</h1>
      <p>Lista de regalos de cocina</p>
    </div>

    <div class="card">

      <table>
        <thead>
          <tr>
            <th>Artículo</th>
            <th>Categoría</th>
            <th>Persona</th>
            <th>Estado</th>
          </tr>
        </thead>

        <tbody id="giftTable"></tbody>

      </table>

    </div>

    <div class="footer">
      Gracias por ser parte de este momento especial ❤️
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      set,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDL0R2Vi5Na-D-xRff-8RSa766om2FPKbA",
      authDomain: "lista-de-regalos-de-cocina.firebaseapp.com",
      databaseURL: "https://lista-de-regalos-de-cocina-default-rtdb.firebaseio.com",
      projectId: "lista-de-regalos-de-cocina",
      storageBucket: "lista-de-regalos-de-cocina.firebasestorage.app",
      messagingSenderId: "8167682777",
      appId: "1:8167682777:web:64dbc9302b3fc2570084c8",
      measurementId: "G-1X8V9M6BFZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const gifts = [

  // Cocina

  ["Pinzas","Cocina"],
  ["Batidores manuales","Cocina"],
  ["Peladores","Cocina"],
  ["Ralladores","Cocina"],
  ["Prensador de ajo","Cocina"],
  ["Abrelatas","Cocina"],
  ["Sacacorchos","Cocina"],

  // Set de repostería

  ["Rodillo","Set de repostería"],
  ["Brochas de cocina","Set de repostería"],
  ["Cortadores (pizza/galletas)","Set de repostería"],
  ["Tapetes de silicona","Set de repostería"],

  // Set de medición

  ["Tazas medidoras","Set de medición"],
  ["Cucharadas medidoras","Set de medición"],
  ["Jarras medidoras","Set de medición"],

  // Preparación y cocina

  ["Set de bowls","Preparación"],
  ["Coladores","Preparación"],
  ["Embudos","Preparación"],
  ["Tijeras de cocina","Preparación"],
  ["Set de cuchillos para queso","Preparación"],
  ["Set de afilado","Preparación"],
  ["Tablas de picar","Preparación"],

  // Ollas y cocción

  ["Ollas","Cocción"],
  ["Cacerolas","Cocción"],
  ["Vaporera","Cocción"],

  // Horneado

  ["Bandejas o moldes","Horneado"],
  ["Rejillas","Horneado"],

  // Cocina exterior

  ["Plancha","Cocina exterior"],
  ["Parrilla","Cocina exterior"],

  // Electrodomésticos

  ["Tostadora","Electrodomésticos"],
  ["Cafetera","Electrodomésticos"],
  ["Hervidor eléctrico","Electrodomésticos"],
  ["Sandwichera","Electrodomésticos"],
  ["Licuadora","Electrodomésticos"],
  ["Batidora","Electrodomésticos"],
  ["Procesador de alimentos","Electrodomésticos"],
  ["Olla arrocera","Electrodomésticos"],
  ["Olla de cocción lenta","Electrodomésticos"],

  // Vajilla

  ["Set de vajilla","Vajilla"],
  ["Individuales","Vajilla"],

  // Organización

  ["Guantes de cocina","Organización"],
  ["Set de recipientes herméticos","Organización"],
  ["Set de frascos de vidrio","Organización"],

  // Hogar

  ["Toallas","Hogar"],
  ["Huevera","Hogar"],
  ["Escurridor de platos","Hogar"],
  ["Sábanas King","Hogar"],
  ["Edredones King","Hogar"],
  ["Limpiones de microfibra","Hogar"],
  ["Pañeras","Hogar"],
  ["Servilletero","Hogar"],
  ["Prensa francesa","Hogar"],
  ["Ganchos para ropa","Hogar"]

];

    const table = document.getElementById("giftTable");

    gifts.forEach((gift, index) => {

      const row = document.createElement("tr");

      row.innerHTML = `
        <td class="gift-name">${gift[0]}</td>

        <td>
          <span class="category">${gift[1]}</span>
        </td>

        <td>
          <input
            type="text"
            id="input-${index}"
            placeholder="Nombre"
          />
        </td>

        <td>
          <span class="status available" id="status-${index}">
            🟢 Disponible
          </span>
        </td>
      `;

      table.appendChild(row);

      const input = document.getElementById(`input-${index}`);
      const status = document.getElementById(`status-${index}`);

      onValue(ref(db, 'reservas/' + index), (snapshot) => {

        const data = snapshot.val();

        if(data && data.nombre){

          input.value = data.nombre;

          status.classList.remove("available");
          status.classList.add("reserved");

          status.innerHTML = "🔴 Reservado";

        } else {

          input.value = "";

          status.classList.remove("reserved");
          status.classList.add("available");

          status.innerHTML = "🟢 Disponible";
        }

      });

      input.addEventListener("change", async () => {

        await set(ref(db, 'reservas/' + index), {
          nombre: input.value
        });

      });

    });

  </script>

</body>
</html>
